# Niro — Find (Claude): pentest this app with Claude and report what it finds.
# Read-only — it never writes to your repo (no branches, no PRs, no commits):
# permissions below are contents: read, so even if something tried to push,
# GitHub would refuse. The zero-setup way to see what Niro finds.
name: Niro Find (Claude)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: niro-find-claude-${{ github.ref }}
  cancel-in-progress: false

jobs:
  find:
    name: Pentest and report findings (Claude)
    runs-on: ubuntu-latest
    timeout-minutes: 300

    env:
      NIRO_AGENT: claude
      NIRO_CONFIG_DIR: niro
      NIRO_GOAL: "Pentest this application"
      NIRO_CI_ARTIFACT_INCLUDE_FINDINGS: "true"
      NIRO_CI_ARTIFACT_UPLOAD_DEBUG_LOGS: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Niro CI
        shell: bash
        run: curl -fsSL https://raw.githubusercontent.com/apxlabs-ai/niro/main/install-ci.sh | sh

      - name: Run Niro
        shell: bash
        env:
          # Claude auth. CLAUDE_CODE_OAUTH_TOKEN for a Claude Code
          # subscription/OAuth; ANTHROPIC_API_KEY for API-key setups.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: niro-ci find

      - name: Upload Niro knowledge
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: niro-knowledge
          path: niro-knowledge.tar
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload debug logs
        if: always() && contains(fromJSON('["true","TRUE","1","yes","YES","on","ON"]'), env.NIRO_CI_ARTIFACT_UPLOAD_DEBUG_LOGS)
        uses: actions/upload-artifact@v7
        with:
          name: niro-debug-logs-unsafe
          path: niro-debug-artifacts/**
          if-no-files-found: ignore
          retention-days: 7
