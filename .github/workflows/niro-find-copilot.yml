# Niro — Find (Copilot): pentest this app with Copilot and report what it finds.
# Read-only — it never writes to your repo (no branches, no PRs, no commits):
# permissions below are contents: read, so even if something tried to push,
# GitHub would refuse. The zero-setup way to see what Niro finds.
#
# Copilot runs on your own model key through an OpenAI-compatible gateway
# (here, OpenRouter). Adjust COPILOT_MODEL / provider to taste.
name: Niro Find (Copilot)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: niro-find-copilot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  find:
    name: Pentest and report findings (Copilot)
    runs-on: ubuntu-latest
    timeout-minutes: 300

    env:
      NIRO_AGENT: copilot
      NIRO_CONFIG_DIR: niro
      NIRO_GOAL: "Pentest this application"
      NIRO_CI_ARTIFACT_INCLUDE_FINDINGS: "true"
      NIRO_CI_ARTIFACT_UPLOAD_DEBUG_LOGS: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Niro CI
        shell: bash
        run: curl -fsSL https://raw.githubusercontent.com/apxlabs-ai/niro/main/install-ci.sh | sh

      - name: Run Niro
        shell: bash
        env:
          # Copilot on your own model key via an OpenAI-compatible gateway.
          OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
          COPILOT_PROVIDER_BASE_URL: https://openrouter.ai/api/v1
          COPILOT_PROVIDER_TYPE: openai
          COPILOT_MODEL: z-ai/glm-5.2
        run: niro-ci find

      - name: Upload Niro knowledge
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: niro-knowledge
          path: niro-knowledge.tar
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload debug logs
        if: always() && contains(fromJSON('["true","TRUE","1","yes","YES","on","ON"]'), env.NIRO_CI_ARTIFACT_UPLOAD_DEBUG_LOGS)
        uses: actions/upload-artifact@v7
        with:
          name: niro-debug-logs-unsafe
          path: niro-debug-artifacts/**
          if-no-files-found: ignore
          retention-days: 7
